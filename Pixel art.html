<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zolter — Пиксельный редактор</title>
<link href="https://cdn.jsdelivr.net/npm/fontsource-ibm-plex-sans@5.0.8/index.min.css" rel="stylesheet">
<style>
:root {
  --bg: #FAF7F4;
  --surface: #FFFFFF;
  --surface-alt: #F2EDE7;
  --surface-alt2: #E8E0D8;
  --border: #D4C9BE;
  --text: #2C2825;
  --text-sec: #6B6560;
  --text-light: #9B9490;
  --accent: #B8A088;
  --accent-dark: #8C7560;
  --canvas-bg: #E8E0D8;
  --shadow: rgba(0,0,0,0.08);
}

[data-theme="dark"] {
  --bg: #1A1816;
  --surface: #24201C;
  --surface-alt: #2A2622;
  --surface-alt2: #3A3530;
  --border: #4A433D;
  --text: #D4C9BE;
  --text-sec: #9B9490;
  --text-light: #6B6560;
  --accent: #B8A088;
  --accent-dark: #D4C9BE;
  --canvas-bg: #2A2622;
  --shadow: rgba(0,0,0,0.4);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.topbar {
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  flex-shrink: 0;
  z-index: 50;
}

.topbar-left, .topbar-right { display: flex; align-items: center; gap: 12px; }

.logo { font-size: 16px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--text); text-decoration: none; }
.logo span { color: var(--accent); }

.page-title { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-light); padding: 0 16px; border-left: 1px solid var(--border); margin-left: 8px; }

.btn { padding: 8px 14px; background: none; border: 1px solid var(--border); color: var(--text-sec); font-size: 11px; letter-spacing: 1.2px; text-transform: uppercase; cursor: pointer; transition: all 0.2s; font-family: inherit; display: flex; align-items: center; gap: 6px; border-radius: 4px; white-space: nowrap; }
.btn:hover { background: var(--surface-alt); color: var(--text); border-color: var(--border); }
.btn.primary { background: var(--text); color: var(--bg); border-color: var(--text); }
.btn.primary:hover { opacity: 0.85; }

.btn-group { display: flex; gap: 4px; }
.btn-group .btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

.theme-toggle { width: 32px; height: 32px; background: none; border: 1px solid var(--border); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; color: var(--text-sec); flex-shrink: 0; }
.theme-toggle:hover { background: var(--surface-alt); }

.workspace { flex: 1; display: flex; overflow: hidden; }

.panel { background: var(--surface); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
.panel-left { width: 220px; border-right: 1px solid var(--border); }
.panel-right { width: 220px; border-left: 1px solid var(--border); }

.panel-section { padding: 16px; border-bottom: 1px solid var(--border); }

.section-title { font-size: 10px; letter-spacing: 2.5px; text-transform: uppercase; color: var(--text-light); margin-bottom: 12px; }

.tools-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

.tool-btn { aspect-ratio: 1; background: var(--surface-alt); border: 1px solid transparent; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; color: var(--text-sec); }
.tool-btn:hover { background: var(--surface-alt2); color: var(--text); }
.tool-btn.active { border-color: var(--accent); background: var(--surface-alt2); color: var(--accent-dark); }
.tool-btn svg { width: 20px; height: 20px; }

.palette-section { margin-bottom: 8px; }

.palette-name {
  font-size: 10px; letter-spacing: 2px; text-transform: uppercase;
  color: var(--accent-dark); margin-bottom: 8px; font-weight: 600;
  display: flex; align-items: center; gap: 6px;
}
.palette-name::before { content: ''; width: 8px; height: 8px; background: var(--accent); border-radius: 2px; }
.palette-name.std { color: var(--text-light); }
.palette-name.std::before { background: var(--text-light); }

.palette-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; margin-bottom: 14px; }

.swatch { aspect-ratio: 1; border-radius: 4px; cursor: pointer; border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s; }
.swatch:hover { transform: scale(1.15); }
.swatch.active { border-color: var(--text); box-shadow: 0 0 0 2px var(--bg); }

.color-row { display: flex; gap: 8px; align-items: center; }
.color-input { width: 36px; height: 30px; border: 1px solid var(--border); border-radius: 4px; cursor: pointer; background: var(--surface); padding: 2px; }
.hex-input { flex: 1; height: 30px; border: 1px solid var(--border); background: var(--surface-alt); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 0 8px; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; }
.hex-input:focus { outline: none; border-color: var(--accent); }

.canvas-area { flex: 1; background: var(--canvas-bg); display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
#pixel-canvas { display: block; image-rendering: pixelated; image-rendering: crisp-edges; cursor: crosshair; touch-action: none; }

.control-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 12px; color: var(--text-sec); }
.control-input { width: 64px; height: 28px; border: 1px solid var(--border); background: var(--surface-alt); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 11px; padding: 0 6px; border-radius: 4px; text-align: center; }
.control-input:focus { outline: none; border-color: var(--accent); }

.text-input-row { display: flex; gap: 6px; margin-top: 8px; }
.text-input { flex: 1; height: 30px; border: 1px solid var(--border); background: var(--surface-alt); color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 12px; padding: 0 8px; border-radius: 4px; }
.text-input:focus { outline: none; border-color: var(--accent); }
.text-size-select { height: 30px; border: 1px solid var(--border); background: var(--surface-alt); color: var(--text); font-size: 11px; padding: 0 6px; border-radius: 4px; }

.export-btn { width: 100%; padding: 10px; margin-bottom: 6px; background: var(--surface-alt); border: 1px solid var(--border); color: var(--text-sec); font-size: 11px; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; font-family: inherit; border-radius: 4px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px; }
.export-btn:hover { background: var(--surface-alt2); color: var(--text); border-color: var(--border); }
.export-btn.primary-export { background: var(--accent-dark); color: #fff; border-color: var(--accent-dark); }

.statusbar { height: 28px; background: var(--surface); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; font-size: 11px; color: var(--text-light); flex-shrink: 0; letter-spacing: 0.5px; }

.panel::-webkit-scrollbar { width: 4px; }
.panel::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

@media (max-width: 1024px) { .panel-left, .panel-right { width: 180px; } .page-title { display: none; } }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" class="logo">ZOLT<span>ER</span></a>
    <span class="page-title">Пиксельный редактор</span>
  </div>
  <div class="topbar-right">
    <div class="btn-group">
      <button class="btn" id="btn-undo" title="Отменить">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"><path d="M3 6h8a3 3 0 010 6H8" stroke-width="1.5" stroke-linecap="round"/><path d="M6 3L3 6l3 3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button class="btn" id="btn-redo" title="Повторить">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"><path d="M13 6H5a3 3 0 000 6h3" stroke-width="1.5" stroke-linecap="round"/><path d="M10 3l3 3-3 3" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
    <button class="btn" id="btn-clear">Очистить</button>
    <button class="theme-toggle" id="theme-toggle" title="Сменить тему">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor"><circle cx="8" cy="8" r="4" stroke-width="1.5"/><path d="M8 2v2M8 12v2M2 8h2M12 8h2M3.5 3.5l1.5 1.5M11 11l1.5 1.5M3.5 12.5l1.5-1.5M11 5l1.5-1.5" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
</div>

<div class="workspace">
  <div class="panel panel-left">
    <div class="panel-section">
      <div class="section-title">Инструменты</div>
      <div class="tools-grid" id="tools-grid">
        <button class="tool-btn active" data-tool="pencil" title="Карандаш (P)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M16 3l5 5-11 11H5v-5L16 3z" stroke-width="2" stroke-linejoin="round"/></svg>
        </button>
        <button class="tool-btn" data-tool="eraser" title="Ластик (E)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 20H7L3 16l8-8 9 9-4 4z" stroke-width="2" stroke-linejoin="round"/><line x1="6" y1="11" x2="14" y2="19" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button class="tool-btn" data-tool="fill" title="Заливка (G)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 3l5 5-5 5-5-5 5-5z" stroke-width="2" stroke-linejoin="round"/><path d="M12 13v7M9 17h6" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button class="tool-btn" data-tool="line" title="Линия (L)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><line x1="4" y1="20" x2="20" y2="4" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button class="tool-btn" data-tool="rect" title="Прямоугольник (R)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="4" y="4" width="16" height="16" rx="1" stroke-width="2"/></svg>
        </button>
        <button class="tool-btn" data-tool="circle" title="Круг (C)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="8" stroke-width="2"/></svg>
        </button>
        <button class="tool-btn" data-tool="text" title="Текст (T)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 5h16M12 5v14M8 19h8" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
        <button class="tool-btn" data-tool="picker" title="Пипетка (I)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 3l7 7-10 10-4 1 1-4 6-6z" stroke-width="2" stroke-linejoin="round"/><circle cx="18" cy="6" r="2" stroke-width="2"/></svg>
        </button>
      </div>
    </div>

    <div class="panel-section">
      <div class="section-title">Палитра</div>

      <div class="palette-section">
        <div class="palette-name">Zolter</div>
        <div class="palette-grid" id="zolter-palette"></div>
      </div>

      <div class="palette-section">
        <div class="palette-name std">Стандартная</div>
        <div class="palette-grid" id="standard-palette"></div>
      </div>

      <div class="color-row">
        <input type="color" class="color-input" id="custom-color" value="#B8A088">
        <input type="text" class="hex-input" id="hex-input" value="#B8A088" maxlength="7">
      </div>
    </div>

    <div class="panel-section">
      <div class="section-title">Текст</div>
      <div class="text-input-row">
        <input type="text" class="text-input" id="text-content" placeholder="Введите текст..." maxlength="20" value="A">
        <select class="text-size-select" id="text-size">
          <option value="8">8px</option>
          <option value="12" selected>12px</option>
          <option value="16">16px</option>
          <option value="24">24px</option>
          <option value="32">32px</option>
        </select>
      </div>
      <div style="margin-top: 8px; font-size: 10px; color: var(--text-light);">Кликните на холст, чтобы разместить текст</div>
    </div>

    <div class="panel-section">
      <div class="section-title">Свойства</div>
      <div class="control-row">
        <span>Размер пикселя</span>
        <input type="number" class="control-input" id="px-size" value="16" min="4" max="80" step="1">
      </div>
      <div class="control-row">
        <span>Сетка</span>
        <input type="checkbox" id="show-grid" checked>
      </div>
    </div>
  </div>

  <div class="canvas-area" id="canvas-area">
    <canvas id="pixel-canvas"></canvas>
  </div>

  <div class="panel panel-right">
    <div class="panel-section">
      <div class="section-title">Холст</div>
      <div class="control-row">
        <span>Ширина</span>
        <input type="number" class="control-input" id="grid-w" value="32" min="4" max="128">
      </div>
      <div class="control-row">
        <span>Высота</span>
        <input type="number" class="control-input" id="grid-h" value="32" min="4" max="128">
      </div>
      <button class="btn primary" id="btn-resize" style="width:100%; margin-top:8px;">Применить</button>
    </div>

    <div class="panel-section">
      <div class="section-title">Масштаб</div>
      <div class="btn-group" style="width:100%">
        <button class="btn" id="zoom-out" style="flex:1">−</button>
        <span id="zoom-display" style="flex:1; text-align:center; line-height:32px; font-size:12px; color:var(--text-sec);">100%</span>
        <button class="btn" id="zoom-in" style="flex:1">+</button>
      </div>
    </div>

    <div class="panel-section" style="flex:1; border-bottom:none;">
      <div class="section-title">Экспорт</div>
      <button class="export-btn primary-export" id="export-png">↓ PNG (x1)</button>
      <button class="export-btn primary-export" id="export-png-4x">↓ PNG (x4)</button>
      <button class="export-btn" id="export-html">↓ HTML (Самодостаточный)</button>
    </div>
  </div>
</div>

<div class="statusbar">
  <span id="status-tool">Инструмент: Карандаш</span>
  <span id="status-pos">X: 0, Y: 0</span>
  <span id="status-size">32 × 32</span>
</div>

<script>
(function() {
  const state = {
    grid: [],
    width: 32,
    height: 32,
    pixelSize: 16,
    zoom: 1,
    tool: 'pencil',
    color: '#B8A088',
    showGrid: true,
    isDrawing: false,
    lastGridX: -1,
    lastGridY: -1,
    previewShape: null,
    history: [],
    historyIndex: -1,
    maxHistory: 60
  };

  const canvas = document.getElementById('pixel-canvas');
  const ctx = canvas.getContext('2d');
  const area = document.getElementById('canvas-area');

  function init() {
    const savedTheme = localStorage.getItem('zolter-pixel-theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);

    createGrid(state.width, state.height);
    setupPalettes();
    setupUI();
    render();
    saveHistory();
  }

  function createGrid(w, h) {
    state.width = Math.max(4, Math.min(128, w));
    state.height = Math.max(4, Math.min(128, h));
    state.grid = Array.from({ length: state.height }, () => Array(state.width).fill(null));
    document.getElementById('status-size').textContent = `${state.width} × ${state.height}`;
  }

  const zolterColors = [
    '#2C2825', '#4A433D', '#6B6560', '#8C7560', '#B8A088', '#D4C9BE',
    '#E8E0D8', '#F2EDE7', '#FAF7F4', '#FFFFFF',
    '#3A2D1F', '#5C4A32', '#7A6B52', '#9B8B6E', '#C4A87A', '#DEBB7A',
    '#F5D9A0', '#FFF0C8',
    '#1A2332', '#2C3E50', '#3D566E', '#4A6F8C', '#6BA3BE', '#A5CBE0'
  ];

  const standardColors = [
    '#000000', '#FFFFFF',
    '#C0392B', '#E74C3C', '#E67E22', '#F1C40F',
    '#27AE60', '#2ECC71', '#2980B9', '#3498DB',
    '#8E44AD', '#9B59B6', '#D35400', '#16A085'
  ];

  function setupPalettes() {
    const zGrid = document.getElementById('zolter-palette');
    zolterColors.forEach((c, i) => {
      const s = document.createElement('div');
      s.className = 'swatch' + (i === 4 ? ' active' : '');
      s.style.background = c;
      if (c === '#FFFFFF' || c === '#FAF7F4' || c === '#F2EDE7' || c === '#E8E0D8' || c === '#FFF0C8') {
        s.style.border = '1px solid var(--border)';
      }
      s.addEventListener('click', () => selectColor(c, s));
      zGrid.appendChild(s);
    });

    const sGrid = document.getElementById('standard-palette');
    standardColors.forEach((c, i) => {
      const s = document.createElement('div');
      s.className = 'swatch';
      s.style.background = c;
      if (c === '#FFFFFF') s.style.border = '1px solid var(--border)';
      s.addEventListener('click', () => selectColor(c, s));
      sGrid.appendChild(s);
    });
  }

  function selectColor(c, swatch) {
    state.color = c;
    document.getElementById('custom-color').value = c;
    document.getElementById('hex-input').value = c.toUpperCase();
    document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    if (swatch) swatch.classList.add('active');
  }

  function setupUI() {
    document.getElementById('custom-color').addEventListener('input', e => {
      state.color = e.target.value;
      document.getElementById('hex-input').value = e.target.value.toUpperCase();
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
    });

    document.getElementById('hex-input').addEventListener('change', e => {
      if (/^#[0-9A-Fa-f]{6}$/.test(e.target.value)) {
        state.color = e.target.value;
        document.getElementById('custom-color').value = e.target.value;
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      }
    });

    document.querySelectorAll('.tool-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        state.tool = btn.dataset.tool;
        updateStatus();
      });
    });

    document.getElementById('px-size').addEventListener('change', e => {
      state.pixelSize = Math.max(4, Math.min(80, parseInt(e.target.value) || 16));
      e.target.value = state.pixelSize;
      render();
    });

    document.getElementById('show-grid').addEventListener('change', e => {
      state.showGrid = e.target.checked;
      render();
    });

    document.getElementById('btn-resize').addEventListener('click', () => {
      const w = parseInt(document.getElementById('grid-w').value) || 32;
      const h = parseInt(document.getElementById('grid-h').value) || 32;
      createGrid(w, h);
      saveHistory();
      render();
    });

    document.getElementById('zoom-in').addEventListener('click', () => setZoom(state.zoom + 1));
    document.getElementById('zoom-out').addEventListener('click', () => setZoom(state.zoom - 1));
    document.getElementById('btn-undo').addEventListener('click', undo);
    document.getElementById('btn-redo').addEventListener('click', redo);
    document.getElementById('btn-clear').addEventListener('click', clearCanvas);

    document.getElementById('export-png').addEventListener('click', () => exportPNG(1));
    document.getElementById('export-png-4x').addEventListener('click', () => exportPNG(4));
    document.getElementById('export-html').addEventListener('click', exportHTML);

    document.getElementById('theme-toggle').addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      const newTheme = isDark ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('zolter-pixel-theme', newTheme);
      render();
    });

    setupCanvasEvents();
    updateStatus();
  }

  function updateStatus() {
    const names = { pencil: 'Карандаш', eraser: 'Ластик', fill: 'Заливка', line: 'Линия', rect: 'Прямоугольник', circle: 'Круг', text: 'Текст', picker: 'Пипетка' };
    document.getElementById('status-tool').textContent = `Инструмент: ${names[state.tool] || state.tool}`;
  }

  function setZoom(z) {
    state.zoom = Math.max(1, Math.min(16, z));
    document.getElementById('zoom-display').textContent = Math.round(state.zoom * 100) + '%';
    document.getElementById('px-size').value = Math.round(state.pixelSize * state.zoom);
    render();
  }

  function clearCanvas() {
    if (!confirm('Очистить холст?')) return;
    state.grid = state.grid.map(row => row.fill(null));
    saveHistory();
    render();
  }

  function screenToGrid(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const relX = (clientX - rect.left) / rect.width;
    const relY = (clientY - rect.top) / rect.height;
    const gx = Math.floor(relX * state.width);
    const gy = Math.floor(relY * state.height);
    return {
      x: Math.max(0, Math.min(state.width - 1, gx)),
      y: Math.max(0, Math.min(state.height - 1, gy))
    };
  }

  function render() {
    const displaySize = state.pixelSize * state.zoom;
    canvas.width = state.width * displaySize + 2;
    canvas.height = state.height * displaySize + 2;
    canvas.style.width = canvas.width + 'px';
    canvas.style.height = canvas.height + 'px';

    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';

    ctx.save();
    ctx.translate(1, 1);
    ctx.scale(state.zoom, state.zoom);

    // Checkerboard background
    const lightCheck = '#F5F0EB';
    const darkCheck = '#2E2A26';
    const checkerColor = isDark ? darkCheck : lightCheck;

    for (let y = 0; y < state.height; y++) {
      for (let x = 0; x < state.width; x++) {
        if ((x + y) % 2 === 0) {
          ctx.fillStyle = checkerColor;
          ctx.fillRect(x * displaySize / state.zoom, y * displaySize / state.zoom, displaySize / state.zoom, displaySize / state.zoom);
        }
      }
    }

    // Draw pixels
    for (let y = 0; y < state.height; y++) {
      for (let x = 0; x < state.width; x++) {
        if (state.grid[y][x]) {
          ctx.fillStyle = state.grid[y][x];
          ctx.fillRect(x * displaySize / state.zoom, y * displaySize / state.zoom, displaySize / state.zoom, displaySize / state.zoom);
        }
      }
    }

    // Preview shape
    if (state.previewShape) {
      const s = state.previewShape;
      const ps = displaySize / state.zoom;
      if (s.type === 'pencil' || s.type === 'eraser') {
        ctx.fillStyle = s.type === 'eraser' ? '#FF000040' : state.color + '60';
        ctx.fillRect(s.x * ps, s.y * ps, ps, ps);
      } else if (s.type === 'line') {
        ctx.fillStyle = state.color + '60';
        const dx = s.x2 - s.x1, dy = s.y2 - s.y1;
        const steps = Math.max(Math.abs(dx), Math.abs(dy));
        for (let i = 0; i <= steps; i++) {
          const px = Math.round(s.x1 + dx * i / steps);
          const py = Math.round(s.y1 + dy * i / steps);
          ctx.fillRect(px * ps, py * ps, ps, ps);
        }
      } else if (s.type === 'rect') {
        const rx = Math.min(s.x1, s.x2), ry = Math.min(s.y1, s.y2);
        const rw = Math.abs(s.x2 - s.x1) + 1, rh = Math.abs(s.y2 - s.y1) + 1;
        ctx.fillStyle = state.color + '40';
        ctx.fillRect(rx * ps, ry * ps, rw * ps, rh * ps);
        ctx.strokeStyle = state.color + '80';
        ctx.lineWidth = 1;
        ctx.strokeRect(rx * ps, ry * ps, rw * ps, rh * ps);
      } else if (s.type === 'circle') {
        ctx.fillStyle = state.color + '40';
        const cx = Math.round((s.x1 + s.x2) / 2);
        const cy = Math.round((s.y1 + s.y2) / 2);
        const rX = Math.abs(s.x2 - s.x1) / 2;
        const rY = Math.abs(s.y2 - s.y1) / 2;
        for (let yy = Math.max(0, Math.floor(cy - rY)); yy <= Math.min(state.height - 1, Math.ceil(cy + rY)); yy++) {
          for (let xx = Math.max(0, Math.floor(cx - rX)); xx <= Math.min(state.width - 1, Math.ceil(cx + rX)); xx++) {
            const ddx = (xx - cx) / Math.max(rX, 0.5);
            const ddy = (yy - cy) / Math.max(rY, 0.5);
            if (ddx * ddx + ddy * ddy <= 1) {
              ctx.fillRect(xx * ps, yy * ps, ps, ps);
            }
          }
        }
      }
    }

    // Grid lines — subtle in dark mode
    if (state.showGrid) {
      const ps = displaySize / state.zoom;
      // Light mode: barely visible dark lines
      // Dark mode: very faint light lines
      const gridColor = isDark ? 'rgba(255, 255, 255, 0.03)' : 'rgba(0, 0, 0, 0.05)';
      ctx.strokeStyle = gridColor;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      for (let i = 0; i <= state.width; i++) {
        ctx.moveTo(i * ps, 0);
        ctx.lineTo(i * ps, state.height * ps);
      }
      for (let i = 0; i <= state.height; i++) {
        ctx.moveTo(0, i * ps);
        ctx.lineTo(state.width * ps, i * ps);
      }
      ctx.stroke();
    }

    ctx.restore();
  }

  function setupCanvasEvents() {
    canvas.addEventListener('mousedown', onPointerDown);
    canvas.addEventListener('mousemove', onPointerMove);
    canvas.addEventListener('mouseup', onPointerUp);
    canvas.addEventListener('mouseleave', () => { state.isDrawing = false; state.previewShape = null; render(); });

    canvas.addEventListener('touchstart', onTouchStart, { passive: false });
    canvas.addEventListener('touchmove', onTouchMove, { passive: false });
    canvas.addEventListener('touchend', onTouchEnd);

    area.addEventListener('wheel', (e) => {
      e.preventDefault();
      if (e.deltaY < 0) setZoom(state.zoom + 1);
      else setZoom(Math.max(1, state.zoom - 1));
    }, { passive: false });
  }

  function onPointerDown(e) {
    e.preventDefault();
    state.isDrawing = true;
    const p = screenToGrid(e.clientX, e.clientY);
    state.lastGridX = p.x;
    state.lastGridY = p.y;

    if (state.tool === 'pencil' || state.tool === 'eraser') {
      drawPixel(p.x, p.y);
      render();
    } else if (state.tool === 'picker') {
      const c = state.grid[p.y][p.x];
      if (c) selectColor(c);
      state.isDrawing = false;
    } else if (state.tool === 'fill') {
      floodFill(p.x, p.y, state.color);
      saveHistory();
      render();
      state.isDrawing = false;
    } else if (state.tool === 'text') {
      placeText(p.x, p.y);
      state.isDrawing = false;
    }
  }

  function onPointerMove(e) {
    const p = screenToGrid(e.clientX, e.clientY);
    document.getElementById('status-pos').textContent = `X: ${p.x}, Y: ${p.y}`;

    if (!state.isDrawing) return;

    if (state.tool === 'pencil' || state.tool === 'eraser') {
      bresenhamLine(state.lastGridX, state.lastGridY, p.x, p.y, (x, y) => {
        state.grid[y][x] = state.tool === 'eraser' ? null : state.color;
      });
      state.lastGridX = p.x;
      state.lastGridY = p.y;
      render();
    } else if (state.tool === 'line' || state.tool === 'rect' || state.tool === 'circle') {
      state.previewShape = { type: state.tool, x1: state.lastGridX, y1: state.lastGridY, x2: p.x, y2: p.y };
      render();
    }
  }

  function onPointerUp(e) {
    if (!state.isDrawing) return;
    state.isDrawing = false;

    if (state.tool === 'line' || state.tool === 'rect' || state.tool === 'circle') {
      const p = screenToGrid(e.clientX, e.clientY);
      if (state.tool === 'line') {
        bresenhamLine(state.lastGridX, state.lastGridY, p.x, p.y, (x, y) => { state.grid[y][x] = state.color; });
      } else if (state.tool === 'rect') {
        const rx = Math.min(state.lastGridX, p.x), ry = Math.min(state.lastGridY, p.y);
        const rw = Math.abs(p.x - state.lastGridX) + 1, rh = Math.abs(p.y - state.lastGridY) + 1;
        for (let y = ry; y < ry + rh && y < state.height; y++) {
          for (let x = rx; x < rx + rw && x < state.width; x++) {
            state.grid[y][x] = state.color;
          }
        }
      } else if (state.tool === 'circle') {
        const cx = Math.round((state.lastGridX + p.x) / 2);
        const cy = Math.round((state.lastGridY + p.y) / 2);
        const rX = Math.abs(p.x - state.lastGridX) / 2;
        const rY = Math.abs(p.y - state.lastGridY) / 2;
        for (let y = 0; y < state.height; y++) {
          for (let x = 0; x < state.width; x++) {
            const dx = (x - cx) / Math.max(rX, 0.5);
            const dy = (y - cy) / Math.max(rY, 0.5);
            if (dx * dx + dy * dy <= 1) state.grid[y][x] = state.color;
          }
        }
      }
      state.previewShape = null;
      saveHistory();
      render();
    }
  }

  function onTouchStart(e) {
    e.preventDefault();
    const t = e.touches[0];
    onPointerDown({ preventDefault: () => {}, clientX: t.clientX, clientY: t.clientY });
  }

  function onTouchMove(e) {
    e.preventDefault();
    const t = e.touches[0];
    onPointerMove({ clientX: t.clientX, clientY: t.clientY });
  }

  function onTouchEnd(e) {
    if (!state.isDrawing) return;
    state.isDrawing = false;
    if (state.tool === 'line' || state.tool === 'rect' || state.tool === 'circle') {
      state.previewShape = null;
      saveHistory();
      render();
    }
  }

  function drawPixel(x, y) {
    state.grid[y][x] = state.tool === 'eraser' ? null : state.color;
  }

  function bresenhamLine(x0, y0, x1, y1, callback) {
    const dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
    const sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
    let err = dx - dy;
    while (true) {
      callback(x0, y0);
      if (x0 === x1 && y0 === y1) break;
      const e2 = 2 * err;
      if (e2 > -dy) { err -= dy; x0 += sx; }
      if (e2 < dx) { err += dx; y0 += sy; }
    }
  }

  function placeText(startX, startY) {
    const text = document.getElementById('text-content').value;
    const fontSize = parseInt(document.getElementById('text-size').value);
    if (!text) return;

    const tempCanvas = document.createElement('canvas');
    const tempCtx = tempCanvas.getContext('2d');
    
    tempCtx.font = `bold ${fontSize}px 'IBM Plex Mono', monospace`;
    const metrics = tempCtx.measureText(text);
    const textWidth = Math.ceil(metrics.width);
    const textHeight = Math.ceil(fontSize * 1.2);
    
    tempCanvas.width = textWidth + 4;
    tempCanvas.height = textHeight + 4;
    
    tempCtx.fillStyle = '#000000';
    tempCtx.font = `bold ${fontSize}px 'IBM Plex Mono', monospace`;
    tempCtx.textBaseline = 'top';
    tempCtx.fillText(text, 2, 2);
    
    const imageData = tempCtx.getImageData(0, 0, tempCanvas.width, tempCanvas.height);
    const data = imageData.data;
    
    let minX = tempCanvas.width, minY = tempCanvas.height, maxX = 0, maxY = 0;
    
    for (let y = 0; y < tempCanvas.height; y++) {
      for (let x = 0; x < tempCanvas.width; x++) {
        const idx = (y * tempCanvas.width + x) * 4;
        const r = data[idx], g = data[idx + 1], b = data[idx + 2], a = data[idx + 3];
        if (a > 128 && !(r === 0 && g === 0 && b === 0)) {
          minX = Math.min(minX, x);
          minY = Math.min(minY, y);
          maxX = Math.max(maxX, x);
          maxY = Math.max(maxY, y);
        }
      }
    }
    
    const tw = maxX - minX + 1;
    const th = maxY - minY + 1;
    
    for (let y = 0; y < th; y++) {
      for (let x = 0; x < tw; x++) {
        const px = minX + x;
        const py = minY + y;
        const idx = (py * tempCanvas.width + px) * 4;
        const a = data[idx + 3];
        
        if (a > 128) {
          const gx = startX + x;
          const gy = startY + y;
          if (gx >= 0 && gx < state.width && gy >= 0 && gy < state.height) {
            const cr = Math.round(data[idx] * (parseInt(state.color.slice(1,3), 16) / 255));
            const cg = Math.round(data[idx + 1] * (parseInt(state.color.slice(3,5), 16) / 255));
            const cb = Math.round(data[idx + 2] * (parseInt(state.color.slice(5,7), 16) / 255));
            state.grid[gy][gx] = `rgb(${cr},${cg},${cb})`;
          }
        }
      }
    }
    
    saveHistory();
    render();
  }

  function floodFill(sx, sy, newColor) {
    const target = state.grid[sy][sx];
    if (target === newColor) return;
    const q = [[sx, sy]];
    while (q.length > 0) {
      const [cx, cy] = q.shift();
      state.grid[cy][cx] = newColor;
      const neighbors = [[cx + 1, cy], [cx - 1, cy], [cx, cy + 1], [cx, cy - 1]];
      for (const [nx, ny] of neighbors) {
        if (nx >= 0 && nx < state.width && ny >= 0 && ny < state.height && state.grid[ny][nx] === target) {
          state.grid[ny][nx] = newColor;
          q.push([nx, ny]);
        }
      }
    }
  }

  function saveHistory() {
    const snap = state.grid.map(r => [...r]);
    state.history.splice(state.historyIndex + 1);
    state.history.push(snap);
    if (state.history.length > state.maxHistory) state.history.shift();
    state.historyIndex = state.history.length - 1;
  }

  function undo() {
    if (state.historyIndex > 0) {
      state.historyIndex--;
      state.grid = state.history[state.historyIndex].map(r => [...r]);
      render();
    }
  }

  function redo() {
    if (state.historyIndex < state.history.length - 1) {
      state.historyIndex++;
      state.grid = state.history[state.historyIndex].map(r => [...r]);
      render();
    }
  }

  function getRenderedCanvas(scale) {
    const tempCanvas = document.createElement('canvas');
    tempCanvas.width = state.width * state.pixelSize * scale;
    tempCanvas.height = state.height * state.pixelSize * scale;
    const tctx = tempCanvas.getContext('2d');
    tctx.imageSmoothingEnabled = false;
    tctx.scale(scale, scale);

    for (let y = 0; y < state.height; y++) {
      for (let x = 0; x < state.width; x++) {
        if (state.grid[y][x]) {
          tctx.fillStyle = state.grid[y][x];
          tctx.fillRect(x * state.pixelSize, y * state.pixelSize, state.pixelSize, state.pixelSize);
        }
      }
    }
    return tempCanvas;
  }

  function exportPNG(scale) {
    const tempCanvas = getRenderedCanvas(scale);
    const link = document.createElement('a');
    link.download = `pixel-art-${new Date().toISOString().slice(0, 10)}-x${scale}.png`;
    link.href = tempCanvas.toDataURL('image/png');
    link.click();
  }

  function exportHTML() {
    const tempCanvas = getRenderedCanvas(1);
    const dataUrl = tempCanvas.toDataURL('image/png');
    const html = `<!DOCTYPE html>\n<html lang="ru">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>Zolter Pixel Art</title>\n<style>\nbody { margin: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #FAF7F4; }\nimg { image-rendering: pixelated; image-rendering: crisp-edges; max-width: 90vw; max-height: 90vh; box-shadow: 0 8px 32px rgba(0,0,0,0.12); border-radius: 8px; }\n</style>\n</head>\n<body>\n<img src="${dataUrl}" alt="Zolter Pixel Art">\n</body>\n</html>`;
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `pixel-art-${new Date().toISOString().slice(0, 10)}.html`;
    a.click();
    URL.revokeObjectURL(url);
  }

  document.addEventListener('keydown', (e) => {
    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
    if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
    if (e.key === 'p') document.querySelector('[data-tool="pencil"]').click();
    if (e.key === 'e') document.querySelector('[data-tool="eraser"]').click();
    if (e.key === 'g') document.querySelector('[data-tool="fill"]').click();
    if (e.key === 'l') document.querySelector('[data-tool="line"]').click();
    if (e.key === 'r') document.querySelector('[data-tool="rect"]').click();
    if (e.key === 'c') document.querySelector('[data-tool="circle"]').click();
    if (e.key === 't') document.querySelector('[data-tool="text"]').click();
    if (e.key === 'i') document.querySelector('[data-tool="picker"]').click();
  });

  init();
})();
</script>
</body>
</html>
