<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zolter Магазин приложений</title>
<link href="https://cdn.jsdelivr.net/npm/fontsource-ibm-plex-sans@5.0.8/index.min.css" rel="stylesheet">
<style>
:root { --bg: #FAF7F4; --text: #2C2825; --text-sec: #6B6560; --text-light: #9B9490; --accent: #B8A088; --accent-dark: #8C7560; --border: #E8E0D8; }
[data-theme="dark"] { --bg: #1A1816; --text: #D4C9BE; --text-sec: #9B9490; --text-light: #6B6560; --accent: #B8A088; --accent-dark: #D4C9BE; --border: #3A3530; }
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'IBM Plex Sans', sans-serif; background: var(--bg); color: var(--text); transition: background .4s, color .4s; min-height: 100vh; }

.topbar { position: sticky; top: 0; z-index: 100; padding: 20px 48px; display: flex; justify-content: space-between; align-items: center; background: linear-gradient(to bottom, var(--bg) 60%, transparent); }
.logo { font-size: 16px; font-weight: 700; letter-spacing: 4px; text-transform: uppercase; color: var(--text); text-decoration: none; }
.logo span { color: var(--accent); }
.theme-toggle { width: 32px; height: 32px; background: none; border: 1px solid var(--border); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--text-sec); transition: .2s; }
.theme-toggle:hover { background: rgba(184,160,136,.12); }

.content { max-width: 800px; margin: 0 auto; padding: 80px 48px 160px; }
h1 { font-size: clamp(32px, 4vw, 56px); font-weight: 200; letter-spacing: -1.5px; margin-bottom: 12px; }
h1 strong { font-weight: 700; color: var(--accent-dark); }
.intro { font-size: 16px; line-height: 1.7; color: var(--text-sec); margin-bottom: 40px; max-width: 560px; }

.section-label { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--accent); margin-bottom: 32px; display: flex; align-items: center; gap: 16px; }
.section-label::before { content: ''; width: 40px; height: 1px; background: var(--accent); }

.search-wrap { position: relative; margin-bottom: 56px; }
#search { width: 100%; padding: 18px 0; border: none; border-bottom: 1px solid var(--border); background: transparent; color: var(--text); font-family: inherit; font-size: 20px; outline: none; transition: border-color .3s; }
#search:focus { border-bottom-color: var(--accent); }
#search::placeholder { color: var(--text-light); }

.app-item { padding: 28px 0; border-bottom: 1px solid var(--border); animation: fadeIn .3s ease-out both; }
.app-item:last-child { border-bottom: none; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

.app-header { display: flex; align-items: baseline; gap: 14px; margin-bottom: 8px; flex-wrap: wrap; }
.app-name { font-size: 20px; font-weight: 600; letter-spacing: -0.2px; }
.app-category { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent); background: rgba(184,160,136,.12); padding: 4px 12px; border-radius: 20px; }
.app-desc { color: var(--text-sec); font-size: 15px; line-height: 1.6; margin-bottom: 12px; }
.app-meta { display: flex; gap: 24px; font-size: 12px; color: var(--text-light); letter-spacing: 0.5px; flex-wrap: wrap; }
.app-meta span { display: flex; align-items: center; gap: 6px; }
.app-link { display: inline-flex; align-items: center; gap: 6px; margin-top: 14px; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--accent-dark); text-decoration: none; transition: gap .25s; cursor: pointer; }
.app-link:hover { gap: 10px; }

.highlight { background: rgba(184,160,136,.35); color: inherit; padding: 0 3px; border-radius: 2px; transition: background .2s; }
[data-theme="dark"] .highlight { background: rgba(184,160,136,.2); }

.empty-state { padding: 40px 0; text-align: center; color: var(--text-light); font-size: 15px; animation: fadeIn .3s ease-out; }

@media (max-width: 768px) {
  .content { padding: 40px 24px 100px; }
  .app-meta { gap: 10px 20px; }
  .topbar { padding: 16px 24px; }
}
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="logo">ZOLT<span>ER</span></a>
  <button class="theme-toggle" id="theme-toggle" title="Сменить тему">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor"><circle cx="8" cy="8" r="4" stroke-width="1.5"/><path d="M8 2v2M8 12v2M2 8h2M12 8h2M3.5 3.5l1.5 1.5M11 11l1.5 1.5M3.5 12.5l1.5-1.5M11 5l1.5-1.5" stroke-width="1.5" stroke-linecap="round"/></svg>
  </button>
</div>

<div class="content">
  <h1>Магазин <strong>приложений</strong></h1>
  <p class="intro">Инструменты для разработки, дизайна и продуктивности. Все приложения созданы командой Zolter и доступны для установки в один клик.</p>

  <div class="section-label">Каталог</div>

  <div class="search-wrap">
    <input type="text" id="search" placeholder="Поиск по названию или описанию...">
  </div>

  <div id="app-list"></div>
</div>

<script>
(function() {
  const savedTheme = localStorage.getItem('zolter-store-theme') || 'light';
  document.documentElement.setAttribute('data-theme', savedTheme);

  document.getElementById('theme-toggle').addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const newTheme = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', newTheme);
    localStorage.setItem('zolter-store-theme', newTheme);
  });

  const apps = [
    { id: 1, name: 'Редактор иконок', desc: 'Рисуйте иконки для своиз приложений и сохраняйте их в ico или png', category: 'Тврорчевство', category: 'Разработка', rating: '4.9', size: '100 МБ' },
    
  ];

  const list = document.getElementById('app-list');
  const searchInput = document.getElementById('search');

  function escapeRegex(str) {
    return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  }

  function highlightText(text, query) {
    if (!query) return text;
    const regex = new RegExp(`(${escapeRegex(query)})`, 'gi');
    return text.replace(regex, '<span class="highlight">$1</span>');
  }

  function render(query = '') {
    list.innerHTML = '';
    const q = query.trim().toLowerCase();
    const filtered = q 
      ? apps.filter(a => a.name.toLowerCase().includes(q) || a.desc.toLowerCase().includes(q))
      : apps;

    if (filtered.length === 0) {
      list.innerHTML = '<div class="empty-state">Ничего не найдено</div>';
      return;
    }

    filtered.forEach((app, i) => {
      const div = document.createElement('div');
      div.className = 'app-item';
      div.style.animationDelay = `${i * 0.04}s`;
      div.innerHTML = `
        <div class="app-header">
          <span class="app-name">${highlightText(app.name, query)}</span>
          <span class="app-category">${app.category}</span>
        </div>
        <div class="app-desc">${highlightText(app.desc, query)}</div>
        <div class="app-meta">
          <span>★ ${app.rating}</span>
          <span>⚙ ${app.size}</span>
        </div>
        <a href="#" class="app-link" onclick="event.preventDefault();alert('Установка ${app.name}...')">Установить →</a>
      `;
      list.appendChild(div);
    });
  }

  searchInput.addEventListener('input', (e) => render(e.target.value));
  render();
})();
</script>
</body>
</html>
