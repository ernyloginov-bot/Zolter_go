<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zolter Editor</title>
<link href="https://cdn.jsdelivr.net/npm/fontsource-ibm-plex-sans@5.0.8/index.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/fontsource-ibm-plex-mono@5.0.8/index.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css">
<style>
:root {
  --bg: #FAF7F4;
  --surface: #FFFFFF;
  --surface-alt: #F2EDE7;
  --border: #E8E0D8;
  --border-light: #D4C9BE;
  --text: #2C2825;
  --text-sec: #6B6560;
  --text-light: #9B9490;
  --accent: #B8A088;
  --accent-dark: #8C7560;
  --editor-bg: #FAF7F4;
  --editor-gutter: #F2EDE7;
  --editor-text: #2C2825;
  --editor-selection: #E8E0D8;
  --preview-bg: #FFFFFF;
  --hint-bg: #FFFFFF;
  --hint-border: #E8E0D8;
  --hint-text: #2C2825;
  --hint-active: #B8A088;
}

[data-theme="dark"] {
  --bg: #1A1816;
  --surface: #24201C;
  --surface-alt: #2A2622;
  --border: #3A3530;
  --border-light: #4A433D;
  --text: #D4C9BE;
  --text-sec: #9B9490;
  --text-light: #6B6560;
  --accent: #B8A088;
  --accent-dark: #D4C9BE;
  --editor-bg: #1A1816;
  --editor-gutter: #24201C;
  --editor-text: #D4C9BE;
  --editor-selection: #3A3530;
  --preview-bg: #1A1816;
  --hint-bg: #24201C;
  --hint-border: #3A3530;
  --hint-text: #D4C9BE;
  --hint-active: #B8A088;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'IBM Plex Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  transition: background-color 0.3s, color 0.3s;
}

/* Top Bar */
.topbar {
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  flex-shrink: 0;
}

.topbar-left, .topbar-center, .topbar-right { display: flex; align-items: center; gap: 16px; }

.logo {
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: var(--text);
}
.logo span { color: var(--accent); }

.btn {
  padding: 8px 16px;
  background: none;
  border: 1px solid var(--border);
  color: var(--text-sec);
  font-size: 12px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  font-family: inherit;
  display: flex;
  align-items: center;
  gap: 6px;
}
.btn:hover { background: var(--surface-alt); color: var(--text); border-color: var(--border-light); }
.btn svg { width: 14px; height: 14px; }

.theme-toggle {
  width: 32px; height: 32px;
  background: none; border: 1px solid var(--border);
  border-radius: 50%; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; color: var(--text-sec);
}
.theme-toggle:hover { background: var(--surface-alt); border-color: var(--border-light); }

/* Main */
.main { flex: 1; display: flex; overflow: hidden; position: relative; }
.pane { display: flex; flex-direction: column; overflow: hidden; }
#editor-pane { width: 50%; background: var(--editor-bg); }
#preview-pane { width: 50%; background: var(--preview-bg); }

.dragger {
  width: 6px;
  background: var(--border);
  cursor: col-resize;
  transition: background 0.2s;
  flex-shrink: 0;
  position: relative;
}
.dragger:hover, .dragger.active { background: var(--accent); }
.dragger::after {
  content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  width: 2px; height: 32px; background: var(--border-light); border-radius: 1px;
}

.pane-header {
  height: 36px;
  background: var(--surface-alt);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-light);
  flex-shrink: 0;
  justify-content: space-between;
  gap: 8px;
}

.pane-header .hint-text {
  font-size: 10px;
  opacity: 0.6;
  white-space: nowrap;
}

#preview-frame {
  flex: 1; width: 100%; border: none;
  background: var(--preview-bg);
}

/* Status Bar */
.statusbar {
  height: 28px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 24px;
  font-size: 11px;
  color: var(--text-light);
  flex-shrink: 0;
  letter-spacing: 0.5px;
}
.status-item { display: flex; gap: 16px; }
.status-item span { display: flex; align-items: center; gap: 4px; }

/* CodeMirror */
.CodeMirror {
  height: 100% !important;
  font-family: 'IBM Plex Mono', monospace !important;
  font-size: 14px !important;
  line-height: 1.7 !important;
  background: var(--editor-bg) !important;
  color: var(--editor-text) !important;
}
.CodeMirror-gutters {
  background: var(--editor-gutter) !important;
  border-right: 1px solid var(--border) !important;
}
.CodeMirror-linenumber { color: var(--text-light) !important; }
.CodeMirror-cursor { border-left-color: var(--accent-dark) !important; }
.CodeMirror-selected { background: var(--editor-selection) !important; }

/* Light syntax */
.cm-s-zolter-light .cm-keyword { color: #8C7560; font-weight: 600; }
.cm-s-zolter-light .cm-string { color: #6B6560; }
.cm-s-zolter-light .cm-tag { color: #2C2825; font-weight: 700; }
.cm-s-zolter-light .cm-attribute { color: #B8A088; font-style: italic; }
.cm-s-zolter-light .cm-comment { color: #9B9490; font-style: italic; }
.cm-s-zolter-light .cm-meta { color: #8C7560; }
.cm-s-zolter-light .cm-number { color: #8C7560; }
.cm-s-zolter-light .cm-operator { color: #6B6560; }

/* Dark syntax */
.cm-s-zolter-dark .cm-keyword { color: #D4C9BE; font-weight: 600; }
.cm-s-zolter-dark .cm-string { color: #B8A088; }
.cm-s-zolter-dark .cm-tag { color: #FAF7F4; font-weight: 700; }
.cm-s-zolter-dark .cm-attribute { color: #D4C9BE; font-style: italic; }
.cm-s-zolter-dark .cm-comment { color: #6B6560; font-style: italic; }
.cm-s-zolter-dark .cm-meta { color: #9B9490; }
.cm-s-zolter-dark .cm-number { color: #B8A088; }
.cm-s-zolter-dark .cm-operator { color: #D4C9BE; }

/* Hints */
.CodeMirror-hints {
  background: var(--hint-bg) !important;
  border: 1px solid var(--hint-border) !important;
  box-shadow: 0 8px 24px rgba(0,0,0,0.12) !important;
  font-family: 'IBM Plex Mono', monospace !important;
  font-size: 13px !important;
  padding: 4px !important;
  max-height: 200px !important;
  border-radius: 4px !important;
}
.CodeMirror-hint {
  color: var(--hint-text) !important;
  padding: 3px 8px !important;
  border-radius: 2px !important;
}
li.CodeMirror-hint-active {
  background: var(--hint-active) !important;
  color: #fff !important;
}

input[type="file"] { display: none; }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">ZOLT<span>ER</span></div>
    <button class="btn" id="btn-new">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"><path d="M8 3v10M3 8h10" stroke-width="1.5" stroke-linecap="round"/></svg>
      Новый
    </button>
    <button class="btn" id="btn-open">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"><path d="M2 4h4l2 2h6v6H2V4z" stroke-width="1.5" stroke-linejoin="round"/><path d="M14 7v5H2V7" stroke-width="1.5"/></svg>
      Открыть
    </button>
    <button class="btn" id="btn-save">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"><path d="M4 2h8l2 2v10H2V4l2-2z" stroke-width="1.5" stroke-linejoin="round"/><path d="M10 2v5H4V2M4 10h6v3H4z" stroke-width="1.5"/></svg>
      Сохранить
    </button>
  </div>
  <div class="topbar-center">
    <span id="file-name" style="font-size:12px; color:var(--text-light); letter-spacing:1px;">untitled.html</span>
  </div>
  <div class="topbar-right">
    <button class="btn" id="btn-stats">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"><circle cx="8" cy="8" r="6" stroke-width="1.5"/><path d="M8 5v3l2 2" stroke-width="1.5" stroke-linecap="round"/></svg>
      Статистика
    </button>
    <button class="theme-toggle" id="theme-toggle" title="Сменить тему">
      <svg id="icon-theme" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor"><circle cx="8" cy="8" r="4" stroke-width="1.5"/><path d="M8 2v2M8 12v2M2 8h2M12 8h2M3.5 3.5l1.5 1.5M11 11l1.5 1.5M3.5 12.5l1.5-1.5M11 5l1.5-1.5" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
</div>

<input type="file" id="file-input" accept=".html,.htm,.txt,.css,.js" />

<div class="main" id="main-container">
  <div class="pane" id="editor-pane">
    <div class="pane-header">
      <span>Редактор</span>
      <span class="hint-text">Ctrl+Space - подсказки</span>
    </div>
    <textarea id="code-editor"></textarea>
  </div>
  <div class="dragger" id="dragger"></div>
  <div class="pane" id="preview-pane">
    <div class="pane-header">
      <span>Предпросмотр</span>
      <span class="hint-text">Автообновление 0.1с</span>
    </div>
    <iframe id="preview-frame" sandbox="allow-scripts allow-modals allow-same-origin"></iframe>
  </div>
</div>

<div class="statusbar">
  <div class="status-item">
    <span id="status-pos">Ln 1, Col 1</span>
    <span id="status-lines">Строк: 1</span>
  </div>
  <div class="status-item">
    <span id="status-chars">Символов: 0</span>
    <span id="status-timer">00:00:00</span>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/xml/xml.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/javascript/javascript.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/css/css.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/htmlmixed/htmlmixed.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/html-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/xml-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/anyword-hint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/closetag.min.js"></script>

<script>
(function() {
  var STORAGE_KEY = 'zolter-editor-theme';
  var currentTheme = localStorage.getItem(STORAGE_KEY) || 'light';
  document.documentElement.setAttribute('data-theme', currentTheme);

  var defaultContent = '<!DOCTYPE html>\n<html lang="ru">\n<head>\n  <meta charset="UTF-8">\n  <title>Мой проект</title>\n  <style>\n    body {\n      font-family: system-ui, sans-serif;\n      background: #faf7f4;\n      color: #2c2825;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      height: 100vh;\n      margin: 0;\n    }\n    h1 { font-size: 2rem; }\n  </style>\n</head>\n<body>\n  <h1>Привет, мир!</h1>\n</body>\n</html>';

  var textareaEl = document.getElementById('code-editor');
  var cm = CodeMirror.fromTextArea(textareaEl, {
    mode: 'htmlmixed',
    theme: 'zolter-' + currentTheme,
    lineNumbers: true,
    lineWrapping: true,
    autoCloseTags: true,
    extraKeys: {
      'Ctrl-Space': function(editor) { editor.showHint({ completeSingle: false }); },
      'Ctrl-S': function(editor) { saveFile(); }
    },
    hintOptions: {
      completeSingle: false,
      closeOnUnfocus: false
    }
  });

  cm.setValue(defaultContent);
  cm.focus();

  function updateStatusBar() {
    var lineCount = cm.lineCount();
    var charCount = cm.getValue().length;
    document.getElementById('status-lines').textContent = 'Строк: ' + lineCount;
    document.getElementById('status-chars').textContent = 'Символов: ' + charCount;
  }

  var debounceTimer = null;
  cm.on('change', function() {
    updateStatusBar();
    clearTimeout(debounceTimer);
    debounceTimer = setTimeout(function() {
      updatePreview(cm.getValue());
    }, 100);
  });

  cm.on('cursorActivity', function() {
    var cursor = cm.getCursor();
    document.getElementById('status-pos').textContent = 'Ln ' + (cursor.line + 1) + ', Col ' + (cursor.ch + 1);
  });

  cm.on('inputRead', function(editor, change) {
    var typed = change.text[0];
    if (typed && (/[a-zA-Z<]/.test(typed) || typed === '.' || typed === '/')) {
      editor.showHint({ completeSingle: false });
    }
  });

  updateStatusBar();

  // Initial preview
  setTimeout(function() {
    updatePreview(cm.getValue());
    cm.refresh();
  }, 50);

  // === PREVIEW via Blob URL ===
  var blobUrl = null;
  function updatePreview(content) {
    var iframe = document.getElementById('preview-frame');
    if (blobUrl) {
      URL.revokeObjectURL(blobUrl);
    }
    var blob = new Blob([content], { type: 'text/html;charset=utf-8' });
    blobUrl = URL.createObjectURL(blob);
    iframe.src = blobUrl;
  }

  // === THEME TOGGLE ===
  document.getElementById('theme-toggle').addEventListener('click', function() {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    var newTheme = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', newTheme);
    cm.setOption('theme', 'zolter-' + newTheme);
    localStorage.setItem(STORAGE_KEY, newTheme);
  });

  // === FILE OPERATIONS ===
  document.getElementById('btn-new').addEventListener('click', function() {
    if (confirm('Создать новый файл? Несохранённые изменения будут потеряны.')) {
      cm.setValue('');
      document.getElementById('file-name').textContent = 'untitled.html';
      updatePreview('');
      updateStatusBar();
    }
  });

  document.getElementById('btn-open').addEventListener('click', function() {
    document.getElementById('file-input').click();
  });

  document.getElementById('file-input').addEventListener('change', function(e) {
    var file = e.target.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      cm.setValue(ev.target.result);
      document.getElementById('file-name').textContent = file.name;
      updatePreview(cm.getValue());
      updateStatusBar();
    };
    reader.readAsText(file);
    e.target.value = '';
  });

  function saveFile() {
    var content = cm.getValue();
    var name = document.getElementById('file-name').textContent;
    if (!name || name === 'untitled.html') name = 'document.html';
    var ext = name.indexOf('.') !== -1 ? name.substring(name.lastIndexOf('.')) : '.html';
    var blob = new Blob([content], { type: 'text/html;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = name;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  document.getElementById('btn-save').addEventListener('click', saveFile);

  // === DRAGGABLE DIVIDER ===
  var dragger = document.getElementById('dragger');
  var container = document.getElementById('main-container');
  var editorPane = document.getElementById('editor-pane');
  var previewPane = document.getElementById('preview-pane');
  var isDragging = false;

  dragger.addEventListener('mousedown', function(e) {
    isDragging = true;
    dragger.classList.add('active');
    e.preventDefault();
    e.stopPropagation();
  });

  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    var rect = container.getBoundingClientRect();
    var percent = ((e.clientX - rect.left) / rect.width) * 100;
    var safePercent = Math.max(20, Math.min(80, percent));
    editorPane.style.width = safePercent + '%';
    previewPane.style.width = (100 - safePercent) + '%';
    cm.refresh();
  });

  document.addEventListener('mouseup', function() {
    if (isDragging) {
      isDragging = false;
      dragger.classList.remove('active');
      cm.refresh();
    }
  });

  // === TIMER ===
  var startTime = Date.now();
  var savedStart = localStorage.getItem('zolter-start-time');
  if (savedStart) {
    startTime = parseInt(savedStart, 10);
    if (Date.now() - startTime > 86400000) {
      startTime = Date.now();
      localStorage.setItem('zolter-start-time', startTime);
    }
  } else {
    localStorage.setItem('zolter-start-time', startTime);
  }

  function formatDuration(ms) {
    var totalSeconds = Math.floor(ms / 1000);
    var hours = Math.floor(totalSeconds / 3600);
    var minutes = Math.floor((totalSeconds % 3600) / 60);
    var seconds = totalSeconds % 60;
    return (hours < 10 ? '0' : '') + hours + ':' +
           (minutes < 10 ? '0' : '') + minutes + ':' +
           (seconds < 10 ? '0' : '') + seconds;
  }

  setInterval(function() {
    document.getElementById('status-timer').textContent = formatDuration(Date.now() - startTime);
  }, 1000);

  document.getElementById('btn-stats').addEventListener('click', function() {
    var duration = Date.now() - startTime;
    var startDate = new Date(startTime).toLocaleString('ru-RU');
    var endDate = new Date().toLocaleString('ru-RU');
    var lineCount = cm.lineCount();
    var charCount = cm.getValue().length;
    var wordCount = cm.getValue().trim() ? cm.getValue().trim().split(/\s+/).length : 0;

    var text = '========================================\n';
    text += '   Zolter Editor: Статистика сессии\n';
    text += '========================================\n\n';
    text += 'Дата начала:   ' + startDate + '\n';
    text += 'Дата окончания: ' + endDate + '\n';
    text += 'Время работы:  ' + formatDuration(duration) + '\n\n';
    text += '--- Документ ---\n';
    text += 'Строк:         ' + lineCount + '\n';
    text += 'Символов:      ' + charCount + '\n';
    text += 'Слов:          ' + wordCount + '\n\n';
    text += '========================================\n';
    text += 'Спасибо за использование Zolter Editor!\n';
    text += '========================================\n';

    var blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'zolter-stats-' + new Date().toISOString().slice(0, 10) + '.txt';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });
})();
</script>
</body>
</html>
