<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zolter — Мейкер мемов</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAF7F4; --surface: #FFFFFF; --surface-alt: #F2EDE7; --surface-alt2: #E8E0D8;
  --border: #D4C9BE; --text: #2C2825; --text-sec: #6B6560; --text-light: #9B9490;
  --accent: #B8A088; --accent-dark: #8C7560; --shadow: rgba(0,0,0,0.06);
}
[data-theme="dark"] {
  --bg: #1A1816; --surface: #24201C; --surface-alt: #2A2622; --surface-alt2: #3A3530;
  --border: #4A433D; --text: #D4C9BE; --text-sec: #9B9490; --text-light: #6B6560;
  --accent: #B8A088; --accent-dark: #D4C9BE; --shadow: rgba(0,0,0,0.3);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;transition:background .3s,color .3s}
.topbar{height:56px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:12px}
.logo{font-size:16px;font-weight:700;letter-spacing:4px;text-transform:uppercase;color:var(--text);text-decoration:none}
.logo span{color:var(--accent)}
.page-title{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--text-light);padding:0 16px;border-left:1px solid var(--border);margin-left:8px}
.topbar-right{display:flex;align-items:center;gap:12px}
.btn{padding:8px 14px;background:none;border:1px solid var(--border);color:var(--text-sec);font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;gap:6px;border-radius:4px;white-space:nowrap}
.btn:hover{background:var(--surface-alt);color:var(--text)}
.btn.primary{background:var(--text);color:var(--bg);border-color:var(--text)}.btn.primary:hover{opacity:.85}
.btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.theme-toggle{width:32px;height:32px;background:none;border:1px solid var(--border);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--text-sec);flex-shrink:0}
.theme-toggle:hover{background:var(--surface-alt)}
.workspace{flex:1;display:flex;overflow:hidden}
.sidebar{width:300px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar::-webkit-scrollbar{width:4px}.sidebar::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.panel-section{padding:14px;border-bottom:1px solid var(--border)}
.section-title{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text-light);margin-bottom:10px}
.control-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:12px;color:var(--text-sec)}
.control-input{width:56px;height:28px;border:1px solid var(--border);background:var(--surface-alt);color:var(--text);font-size:11px;padding:0 6px;border-radius:4px;text-align:center}
.control-input:focus{outline:none;border-color:var(--accent)}
.text-input{width:100%;height:34px;border:1px solid var(--border);background:var(--surface-alt);color:var(--text);font-size:13px;padding:0 10px;border-radius:4px}
.text-input:focus{outline:none;border-color:var(--accent)}
.textarea-input{width:100%;min-height:56px;border:1px solid var(--border);background:var(--surface-alt);color:var(--text);font-size:13px;padding:8px;border-radius:4px;resize:vertical}
.textarea-input:focus{outline:none;border-color:var(--accent)}
.color-input{width:32px;height:28px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:var(--surface);padding:2px}
select.control-input{width:100%;cursor:pointer}
.range-slider{width:100%;accent-color:var(--accent)}
.sticker-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
.sticker-btn{font-size:20px;background:none;border:1px solid transparent;border-radius:6px;cursor:pointer;padding:6px;transition:all .2s}
.sticker-btn:hover{background:var(--surface-alt);border-color:var(--border)}
.bubble-btn{padding:8px;background:var(--surface-alt);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:11px;transition:all .2s;font-family:inherit;color:var(--text-sec);width:100%;margin-bottom:6px}
.bubble-btn:hover{background:var(--surface-alt2);border-color:var(--accent)}
.canvas-area{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative;overflow:hidden;padding:24px}
.canvas-wrapper{position:relative;box-shadow:0 12px 48px var(--shadow);border-radius:8px;overflow:hidden;background:#fff}
#meme-canvas{display:block;max-width:100%;max-height:100%;touch-action:none;cursor:crosshair}
.drop-zone{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:var(--bg)}
.drop-zone.hidden{display:none}
.drop-box{width:320px;height:200px;border:2px dashed var(--border);border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;transition:all .3s;cursor:pointer}
.drop-box:hover,.drop-box.dragover{border-color:var(--accent);background:var(--surface-alt)}
.drop-box svg{width:48px;height:48px;opacity:.3}
.drop-box p{font-size:14px;color:var(--text-light)}
.drop-box .hint{font-size:12px;color:var(--text-light);opacity:.6}
#file-input{display:none}
.drag-hint{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--text-light);background:var(--surface);padding:6px 16px;border-radius:20px;border:1px solid var(--border);opacity:0;transition:opacity .3s;pointer-events:none;z-index:5}
.drag-hint.visible{opacity:1}
.element-item{display:flex;align-items:center;justify-content:space-between;padding:4px 8px;font-size:11px;border-radius:4px;margin-bottom:2px}
.element-item:hover{background:var(--surface-alt)}
.remove-el{background:none;border:none;cursor:pointer;font-size:13px;color:var(--text-light);padding:2px}
.remove-el:hover{color:#C0392B}
</style>
</head>
<body>
<div class="topbar">
  <div class="topbar-left">
    <a href="index.html" class="logo">ZOLT<span>ER</span></a>
    <span class="page-title">Мейкер мемов</span>
  </div>
  <div class="topbar-right">
    <button class="btn" id="btn-new">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor"><path d="M8 3v10M3 8h10" stroke-width="1.5" stroke-linecap="round"/></svg>
      Новое фото
    </button>
    <button class="btn primary" id="btn-download">↓ Скачать мем</button>
    <button class="theme-toggle" id="theme-toggle" title="Сменить тему">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor"><circle cx="8" cy="8" r="4" stroke-width="1.5"/><path d="M8 2v2M8 12v2M2 8h2M12 8h2M3.5 3.5l1.5 1.5M11 11l1.5 1.5M3.5 12.5l1.5-1.5M11 5l1.5-1.5" stroke-width="1.5" stroke-linecap="round"/></svg>
    </button>
  </div>
</div>
<input type="file" id="file-input" accept="image/*">
<div class="workspace">
  <div class="sidebar">
    <div class="panel-section">
      <div class="section-title">Текст мема (перетаскиваемый)</div>
      <div style="margin-bottom:8px"><label style="font-size:10px;color:var(--text-light);display:block;margin-bottom:3px">Верхний текст</label><input class="textarea-input" id="top-text" rows="2" placeholder="Введите верхний текст..."></div>
      <div><label style="font-size:10px;color:var(--text-light);display:block;margin-bottom:3px">Нижний текст</label><input class="textarea-input" id="bottom-text" rows="2" placeholder="Введите нижний текст..."></div>
    </div>
    <div class="panel-section">
      <div class="section-title">Шрифт</div>
      <div class="control-row"><span>Размер</span><input type="number" class="control-input" id="font-size" value="48" min="12" max="200" step="2"></div>
      <div class="control-row"><span>Шрифт</span><select class="control-input" id="font-family"><option value="Impact">Impact</option><option value="Arial Black">Arial Black</option><option value="Comic Sans MS">Comic Sans</option><option value="Georgia">Georgia</option><option value="Verdana">Verdana</option></select></div>
      <div class="control-row"><span>Цвет</span><input type="color" class="color-input" id="text-color" value="#FFFFFF"></div>
      <div class="control-row"><span>Обводка</span><input type="number" class="control-input" id="stroke-width" value="3" min="0" max="15"></div>
      <div class="control-row"><span>Цвет обводки</span><input type="color" class="color-input" id="stroke-color" value="#000000"></div>
    </div>
    <div class="panel-section">
      <div class="section-title">Фильтры</div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:5px" id="filter-grid">
        <button class="btn active" data-filter="none" style="font-size:10px">Нет</button>
        <button class="btn" data-filter="grayscale" style="font-size:10px">Ч/Б</button>
        <button class="btn" data-filter="sepia" style="font-size:10px">Сепия</button>
        <button class="btn" data-filter="invert" style="font-size:10px">Инверсия</button>
        <button class="btn" data-filter="brightness" style="font-size:10px">Яркость+</button>
        <button class="btn" data-filter="contrast" style="font-size:10px">Контраст+</button>
        <button class="btn" data-filter="vintage" style="font-size:10px">Винтаж</button>
        <button class="btn" data-filter="dramatic" style="font-size:10px">Драма</button>
        <button class="btn" data-filter="blur" style="font-size:10px">Размытие</button>
      </div>
    </div>
    <div class="panel-section">
      <div class="section-title">Изображение</div>
      <div style="display:flex;gap:5px;flex-wrap:wrap">
        <button class="btn" id="btn-flip-h" style="flex:1">↔ Гориз.</button>
        <button class="btn" id="btn-flip-v" style="flex:1">↕ Верт.</button>
      </div>
      <div style="display:flex;gap:5px;margin-top:5px">
        <button class="btn" id="btn-rotate-l" style="flex:1">↺ -90°</button>
        <button class="btn" id="btn-rotate-r" style="flex:1">↻ +90°</button>
      </div>
    </div>
    <div class="panel-section">
      <div class="section-title">Облако мыслей (круг)</div>
      <input class="text-input" id="thought-text" placeholder="Текст облака...">
      <div style="display:flex;gap:5px;margin-top:6px">
        <button class="btn" id="btn-add-thought" style="flex:1">+ Добавить</button>
        <button class="btn danger" id="btn-remove-thought" style="flex:1">Удалить выбр.</button>
      </div>
      <div class="control-row" style="margin-top:6px"><span>Размер</span><input type="number" class="control-input" id="thought-size" value="36" min="16" max="120"></div>
    </div>
    <div class="panel-section">
      <div class="section-title">Облако мыслей (прямоугольник)</div>
      <input class="text-input" id="rect-text" placeholder="Текст прямоугольника...">
      <div style="display:flex;gap:5px;margin-top:6px">
        <button class="btn" id="btn-add-rect" style="flex:1">+ Добавить</button>
        <button class="btn danger" id="btn-remove-rect" style="flex:1">Удалить выбр.</button>
      </div>
      <div class="control-row" style="margin-top:6px"><span>Скругление</span><input type="range" class="range-slider" id="rect-radius" min="0" max="100" value="15"></div>
      <div class="control-row"><span>Фон</span><input type="color" class="color-input" id="rect-bg" value="#FFFFFF"></div>
    </div>
    <div class="panel-section">
      <div class="section-title">Стикеры</div>
      <div class="sticker-grid" id="sticker-grid"></div>
      <div class="control-row" style="margin-top:6px"><span>Размер</span><input type="range" class="range-slider" id="sticker-size" min="20" max="150" value="48"><span id="sticker-size-val">48</span></div>
      <div id="elements-list" style="max-height:100px;overflow-y:auto;margin-top:6px"></div>
    </div>
  </div>
  <div class="canvas-area" id="canvas-area">
    <div class="drop-zone" id="drop-zone">
      <div class="drop-box" id="drop-box">
        <svg viewBox="0 0 48 48" fill="none" stroke="currentColor"><rect x="6" y="6" width="36" height="36" rx="4" stroke-width="2"/><circle cx="17" cy="17" r="3" stroke-width="2"/><path d="M6 34l10-10 8 8 6-6 12 12" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <p>Перетащите фото</p>
        <span class="hint">или нажмите для выбора</span>
      </div>
    </div>
    <div class="canvas-wrapper" id="canvas-wrapper" style="display:none">
      <canvas id="meme-canvas"></canvas>
      <div class="drag-hint" id="drag-hint">Перетаскивайте элементы мышкой</div>
    </div>
  </div>
</div>

<script>
(function(){
const savedTheme=localStorage.getItem('zolter-meme-theme')||'light';
document.documentElement.setAttribute('data-theme',savedTheme);
document.getElementById('theme-toggle').addEventListener('click',()=>{
  const d=document.documentElement.getAttribute('data-theme')==='dark';
  const n=d?'light':'dark';
  document.documentElement.setAttribute('data-theme',n);
  localStorage.setItem('zolter-meme-theme',n);render()
});

const canvas=document.getElementById('meme-canvas');
const ctx=canvas.getContext('2d');
const dragHint=document.getElementById('drag-hint');

let state={
  image:null,
  fontSize:48,fontFamily:'Impact',textColor:'#FFFFFF',
  strokeWidth:3,strokeColor:'#000000',
  filter:'none',
  flipH:false,flipV:false,rotation:0,
  stickers:[],
  thoughts:[],
  rects:[],
  stickerSize:48,
  rectRadius:15,rectBg:'#FFFFFF',
  borderWidth:0,borderColor:'#000000'
};

// Drag state
let isDragging=false;
let dragItem=null;
let dragOffsetX=0;
let dragOffsetY=0;
let selectedItem=null;

function getCanvasCoords(e){
  const rect=canvas.getBoundingClientRect();
  const scaleX=canvas.width/rect.width;
  const scaleY=canvas.height/rect.height;
  let clientX=e.touches?e.touches[0].clientX:e.clientX;
  let clientY=e.touches?e.touches[0].clientY:e.clientY;
  return{x:(clientX-rect.left)*scaleX, y:(clientY-rect.top)*scaleY};
}

function loadFile(file){
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      state.image=img;state.rotation=0;state.flipH=false;state.flipV=false;
      state.stickers=[];state.thoughts=[];state.rects=[];selectedItem=null;
      document.getElementById('drop-zone').classList.add('hidden');
      document.getElementById('canvas-wrapper').style.display='block';
      setTimeout(()=>dragHint.classList.add('visible'),500);
      setTimeout(()=>dragHint.classList.remove('visible'),4000);
      render();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function drawThoughtBubble(ctx,text,x,y,size){
  ctx.font=`${size}px serif`;
  const lines=wrapText(ctx,text,size*2.5);
  const lineH=size*1.3;
  const h=lines.length*lineH+size*1.5;
  const w=size*2.5+size;
  // Draw bubble
  ctx.fillStyle='rgba(255,255,255,0.95)';
  ctx.strokeStyle='rgba(180,180,180,0.5)';
  ctx.lineWidth=2;
  ctx.beginPath();
  const cx=x,cy=y;
  // Main ellipse
  ctx.ellipse(cx,cy-size*0.8,w*0.45,h*0.4,0,0,Math.PI*2);
  ctx.fill();ctx.stroke();
  // Small circles for thought effect
  for(let i=0;i<3;i++){
    const r=size*0.25-i*size*0.06;
    const ox=size*0.3+i*size*0.2;
    const oy=size*0.5+i*size*0.3;
    ctx.beginPath();ctx.arc(cx+ox,cy+oy,r,0,Math.PI*2);ctx.fill();ctx.stroke();
  }
  // Text
  ctx.fillStyle='#1A1A1A';
  ctx.font=`${size*0.7}px 'Inter',sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='top';
  lines.forEach((l,i)=>ctx.fillText(l,cx,cy-size*0.8-size*0.35+i*lineH));
}

function drawRectBubble(ctx,text,x,y,w,h,radius){
  ctx.fillStyle=state.rectBg+'cc';
  ctx.strokeStyle='rgba(180,180,180,0.5)';
  ctx.lineWidth=2;
  ctx.beginPath();
  const r=radius;
  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();ctx.fill();ctx.stroke();
  // Text inside
  ctx.fillStyle='#1A1A1A';
  const fontSize=Math.min(h*0.4,w*0.05,20);
  ctx.font=`${fontSize}px 'Inter',sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  const lines=wrapText(ctx,text,w*0.8);
  const lineH=fontSize*1.4;
  const startY=y+h/2-(lines.length*lineH)/2+lineH/2;
  lines.forEach((l,i)=>ctx.fillText(l,x+w/2,startY+i*lineH));
}

function wrapText(ctx,text,maxW){
  if(!text)return[];
  const words=text.split(' ');let lines=[];let line='';
  words.forEach(w=>{const test=line?line+' '+w:w;if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w}else line=test});
  if(line)lines.push(line);return lines;
}

function render(){
  if(!state.image)return;
  const img=state.image;
  let w=img.naturalWidth,h=img.naturalHeight;
  if(state.rotation%180!==0)[w,h]=[h,w];
  const bw=state.borderWidth;
  canvas.width=w+bw*2;canvas.height=h+bw*2;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(bw>0){ctx.fillStyle=state.borderColor;ctx.fillRect(0,0,canvas.width,canvas.height)}
  ctx.save();
  ctx.translate(canvas.width/2,canvas.height/2);
  ctx.rotate(state.rotation*Math.PI/180);
  ctx.scale(state.flipH?-1:1,state.flipV?-1:1);
  let filterStr='';const f=state.filter;
  if(f==='grayscale')filterStr='grayscale(1)';
  else if(f==='sepia')filterStr='sepia(0.8)';
  else if(f==='invert')filterStr='invert(1)';
  else if(f==='blur')filterStr='blur(3px)';
  else if(f==='brightness')filterStr='brightness(1.5)';
  else if(f==='contrast')filterStr='contrast(2)';
  else if(f==='vintage')filterStr='sepia(0.4) contrast(1.1) brightness(0.9)';
  else if(f==='dramatic')filterStr='contrast(1.8) brightness(0.7) saturate(0.6)';
  ctx.filter=filterStr;
  ctx.drawImage(img,-w/2,-h/2,w,h);
  ctx.filter='none';ctx.restore();
  
  // Rect bubbles
  state.rects.forEach((r,i)=>{
    drawRectBubble(ctx,r.text,r.x,r.y,r.w,r.h,state.rectRadius);
    if(i===selectedItem&&selectedItem!==null&&state.rects[selectedItem])drawSelection(ctx,r.x,r.y,r.w,r.h);
  });
  
  // Stickers
  state.stickers.forEach((s,i)=>{
    ctx.font=`${s.size}px serif`;ctx.textBaseline='top';
    ctx.fillText(s.emoji,s.x,s.y);
    if(i===selectedItem&&state.stickers[selectedItem]&&state.rects[selectedItem]===undefined)drawSelection(ctx,s.x-s.size/2,s.y-s.size/2,s.size,s.size);
  });
  
  // Thought bubbles
  state.thoughts.forEach((t,i)=>{
    const realIdx=state.stickers.length+state.thoughts.indexOf(t);
    drawThoughtBubble(ctx,t.text,t.x,t.y,t.size);
    if(i===selectedItem&&selectedItem!==null&&state.rects[selectedItem]===undefined&&state.stickers[selectedItem]===undefined)drawSelection(ctx,t.x-t.size,t.y-t.size,t.size*2,t.size*2);
  });
  
  // Top/bottom text
  const topText=document.getElementById('top-text').value.trim();
  const bottomText=document.getElementById('bottom-text').value.trim();
  ctx.textAlign='center';
  ctx.font=`${state.fontSize}px '${state.fontFamily}', sans-serif`;
  ctx.fillStyle=state.textColor;ctx.strokeStyle=state.strokeColor;
  ctx.lineWidth=state.strokeWidth;ctx.lineJoin='round';ctx.miterLimit=2;
  if(topText){drawMultilineText(topText,canvas.width/2,state.fontSize+state.strokeWidth+10,canvas.width*0.9,'top')}
  if(bottomText){drawMultilineText(bottomText,canvas.width/2,canvas.height-state.strokeWidth-10,canvas.width*0.9,'bottom')}
  
  renderElementsList();
}

function drawSelection(ctx,x,y,w,h){
  ctx.save();ctx.strokeStyle='var(--accent)';ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.strokeRect(x-2,y-2,w+4,h+4);ctx.restore();
}

function drawMultilineText(text,x,y,maxW,align){
  const words=text.split(' ');let lines=[];let line='';
  words.forEach(w=>{const test=line?line+' '+w:w;if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=w}else line=test});
  if(line)lines.push(line);
  const lh=state.fontSize*1.15;const startY=align==='bottom'?y-(lines.length-1)*lh:y;
  lines.forEach((l,i)=>{const ly=startY+i*lh;ctx.strokeText(l,x,ly);ctx.fillText(l,x,ly)});
}

// Hit testing
function hitTestAll(x,y){
  // Test rects first (top layer)
  for(let i=state.rects.length-1;i>=0;i--){
    const r=state.rects[i];
    if(x>=r.x&&x<=r.x+r.w&&y>=r.y&&y<=r.y+r.h)return{type:'rect',idx:i};
  }
  // Test thoughts
  for(let i=state.thoughts.length-1;i>=0;i--){
    const t=state.thoughts[i];
    if(Math.abs(x-t.x)<t.size&&Math.abs(y-t.y)<t.size*1.5)return{type:'thought',idx:i};
  }
  // Test stickers
  for(let i=state.stickers.length-1;i>=0;i--){
    const s=state.stickers[i];
    if(x>=s.x-s.size/2&&x<=s.x+s.size/2&&y>=s.y-s.size/2&&y<=s.y+s.size/2)return{type:'sticker',idx:i};
  }
  return null;
}

// Mouse/touch events
canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('mouseleave',()=>{if(isDragging){isDragging=false;selectedItem=null;render()}});
canvas.addEventListener('touchstart',e=>{e.preventDefault();onDown(e)},{passive:false});
canvas.addEventListener('touchmove',e=>{e.preventDefault();onMove(e)},{passive:false});
canvas.addEventListener('touchend',e=>{onUp(e)});

function onDown(e){
  if(!state.image)return;
  const coords=getCanvasCoords(e);
  const hit=hitTestAll(coords.x,coords.y);
  if(hit){
    isDragging=true;
    if(hit.type==='rect'){
      dragItem=state.rects[hit.idx];
      dragOffsetX=coords.x-dragItem.x;
      dragOffsetY=coords.y-dragItem.y;
    }else if(hit.type==='thought'){
      dragItem=state.thoughts[hit.idx];
      dragOffsetX=coords.x-dragItem.x;
      dragOffsetY=coords.y-dragItem.y;
    }else{
      dragItem=state.stickers[hit.idx];
      dragOffsetX=coords.x-dragItem.x;
      dragOffsetY=coords.y-dragItem.y;
    }
    selectedItem=hit;
    render();
  }else{
    selectedItem=null;render();
  }
}

function onMove(e){
  if(!isDragging||!dragItem||!selectedItem)return;
  const coords=getCanvasCoords(e);
  dragItem.x=coords.x-dragOffsetX;
  dragItem.y=coords.y-dragOffsetY;
  render();
}

function onUp(e){
  isDragging=false;
}

// Drop zone
const dropZone=document.getElementById('drop-zone');
const dropBox=document.getElementById('drop-box');
const fileInput=document.getElementById('file-input');
dropBox.addEventListener('click',()=>fileInput.click());
document.getElementById('btn-new').addEventListener('click',()=>fileInput.click());
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropBox.classList.add('dragover')});
dropZone.addEventListener('dragleave',()=>dropBox.classList.remove('dragover'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropBox.classList.remove('dragover');if(e.dataTransfer.files[0]&&e.dataTransfer.files[0].type.startsWith('image/'))loadFile(e.dataTransfer.files[0])});
fileInput.addEventListener('change',e=>{if(e.target.files[0])loadFile(e.target.files[0]);e.target.value=''});

// Inputs
['font-size','font-family','text-color','stroke-width','stroke-color'].forEach(id=>{
  const el=document.getElementById(id);if(!el)return;
  el.addEventListener('input',()=>{
    if(id==='font-size')state.fontSize=parseInt(el.value)||48;
    if(id==='font-family')state.fontFamily=el.value;
    if(id==='text-color')state.textColor=el.value;
    if(id==='stroke-width')state.strokeWidth=parseInt(el.value)||0;
    if(id==='stroke-color')state.strokeColor=el.value;
    render();
  });
});

document.getElementById('filter-grid').addEventListener('click',e=>{
  const btn=e.target.closest('.btn');if(!btn)return;
  document.querySelectorAll('#filter-grid .btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');state.filter=btn.dataset.filter;render();
});

document.getElementById('btn-flip-h').addEventListener('click',()=>{state.flipH=!state.flipH;render()});
document.getElementById('btn-flip-v').addEventListener('click',()=>{state.flipV=!state.flipV;render()});
document.getElementById('btn-rotate-l').addEventListener('click',()=>{state.rotation=(state.rotation-90+360)%360;render()});
document.getElementById('btn-rotate-r').addEventListener('click',()=>{state.rotation=(state.rotation+90)%360;render()});

document.getElementById('rect-radius').addEventListener('input',e=>{state.rectRadius=parseInt(e.target.value)||0});
document.getElementById('rect-bg').addEventListener('input',e=>{state.rectBg=e.target.value;render()});

// Thought bubbles
document.getElementById('btn-add-thought').addEventListener('click',()=>{
  if(!state.image)return;
  const txt=document.getElementById('thought-text').value||'Мысль...';
  const size=parseInt(document.getElementById('thought-size').value)||36;
  state.thoughts.push({text:txt,x:canvas.width/2,y:canvas.height/3,size:size});
  selectedItem={type:'thought',idx:state.thoughts.length-1};
  render();
});
document.getElementById('btn-remove-thought').addEventListener('click',()=>{
  if(selectedItem&&selectedItem.type==='thought'){state.thoughts.splice(selectedItem.idx,1);selectedItem=null;render()}
});

// Rect bubbles
document.getElementById('btn-add-rect').addEventListener('click',()=>{
  if(!state.image)return;
  const txt=document.getElementById('rect-text').value||'Текст...';
  state.rects.push({text:txt,x:canvas.width/4,y:canvas.height/4,w:canvas.width/2,h:canvas.height/5});
  selectedItem={type:'rect',idx:state.rects.length-1};
  render();
});
document.getElementById('btn-remove-rect').addEventListener('click',()=>{
  if(selectedItem&&selectedItem.type==='rect'){state.rects.splice(selectedItem.idx,1);selectedItem=null;render()}
});

// Stickers
const emojis=['😂','🤣','😭','😱','🤔','👀','💀','🔥','❤️','💯','😎','🤡','👍','👎','🎉','😤','🥺','💪','😈','🤯','😴','🙄','😅','🥲','🤗','😇','🫠','👹','🐶','🐱'];
const stickerGrid=document.getElementById('sticker-grid');
emojis.forEach(e=>{
  const btn=document.createElement('button');
  btn.className='sticker-btn';btn.textContent=e;
  btn.addEventListener('click',()=>{
    if(!state.image)return;
    state.stickers.push({emoji:e,x:canvas.width/2+(Math.random()-0.5)*100,y:canvas.height/2+(Math.random()-0.5)*100,size:state.stickerSize});
    selectedItem={type:'sticker',idx:state.stickers.length-1};
    render();
  });
  stickerGrid.appendChild(btn);
});
document.getElementById('sticker-size').addEventListener('input',e=>{
  state.stickerSize=parseInt(e.target.value)||48;
  document.getElementById('sticker-size-val').textContent=state.stickerSize;
});

// Elements list
function renderElementsList(){
  const list=document.getElementById('elements-list');
  let html='';
  state.stickers.forEach((s,i)=>html+=`<div class="element-item"><span>${s.emoji} (${s.size}px)</span><button class="remove-el" onclick="removeEl('s',${i})">×</button></div>`);
  state.thoughts.forEach((t,i)=>html+=`<div class="element-item"><span>💭 ${t.text.substring(0,10)}</span><button class="remove-el" onclick="removeEl('t',${i})">×</button></div>`);
  state.rects.forEach((r,i)=>html+=`<div class="element-item"><span>▭ ${r.text.substring(0,10)}</span><button class="remove-el" onclick="removeEl('r',${i})">×</button></div>`);
  list.innerHTML=html;
}
window.removeEl=function(type,idx){
  if(type==='s')state.stickers.splice(idx,1);
  else if(type==='t')state.thoughts.splice(idx,1);
  else if(type==='r')state.rects.splice(idx,1);
  selectedItem=null;render();
}

// Download
document.getElementById('btn-download').addEventListener('click',()=>{
  if(!state.image)return;
  selectedItem=null;render();
  const link=document.createElement('a');link.download='meme.png';link.href=canvas.toDataURL('image/png');link.click();
});

document.addEventListener('keydown',e=>{
  if(e.ctrlKey&&e.key==='s'){e.preventDefault();document.getElementById('btn-download').click()}
  if((e.key==='Delete'||e.key==='Backspace')&&selectedItem){
    if(selectedItem.type==='s')state.stickers.splice(selectedItem.idx,1);
    else if(selectedItem.type==='t')state.thoughts.splice(selectedItem.idx,1);
    else if(selectedItem.type==='r')state.rects.splice(selectedItem.idx,1);
    selectedItem=null;render();
  }
});

renderElementsList();
})();
</script>
</body>
</html>
